name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Install · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
